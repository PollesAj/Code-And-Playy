<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binary Sorcerer: Snowy Blue Edition</title>
    <link rel="stylesheet" href="../game-css/style.css">
</head>
<body>
    <!-- Video Background Section -->
    <div class="video-background">
        <video autoplay muted loop id="bg-video">
            <source src="../video/Snow.mp4" type="video/mp4">
        </video>
        <div class="video-overlay"></div>
    </div>

    <!-- Error/Taunt Feedback Box (Hidden by default) -->
    <div id="feedback-box" class="hidden">
        <h2 style="color: #ff3333; margin-top: 0; font-family: 'Courier New', Courier, monospace;">⚠️ SYNTAX ERROR</h2>
        <div id="ai-comment"></div>
        <div id="explanation-text"></div>
        <button id="close-feedback-btn" class="choice-btn" style="margin-top: 20px; border-color: #ff3333; color: #ff3333;">Acknowledge</button>
    </div>

    <div id="game-container">
        <!-- Heads Up Display -->
        <div id="hud" class="hidden">
            <div class="stat">Battery: <span id="battery" style="color: #00ffcc;">100</span>%</div>
            <div class="stat">Chipsets: <span id="chipsets" style="color: #ffff00;">0</span>/15</div>
            <div class="stat">Win Rate: <span id="win-rate">50</span>%</div>
            <div class="stat">Location: <span id="current-location">The Void</span></div>
        </div>

        <!-- Dialogue & Story Box -->
        <div id="dialogue-box">
            <div id="npc-header">
                <span id="npc-emoji">⚠️</span> 
                <span id="npc-name">SYSTEM ALERT</span>
            </div>
            <div id="npc-text">CRITICAL ERROR. Unauthorized entity detected in the Mainframe...</div>
            <button id="proceed-btn">Proceed</button>
        </div>

        <!-- Map Visualization (Progress at the top) -->
        <div id="map-container" class="hidden">
            <h3 id="map-label" style="margin: 0 0 10px 0; font-size: 1em;">Dungeon Progress</h3>
            <div id="room-tracker">
                <!-- Rooms generated by JS -->
            </div>
        </div>

        <!-- Action / Coding Area -->
        <div id="action-area" class="hidden">
            <!-- Tips Bar -->
            <div id="tips-bar">Tip: Always check your syntax before executing!</div>

            <div id="in-game-dialogue" class="character-prompt"></div>
            <p id="challenge-text"></p>
            <div id="code-window"></div>
            <div id="options-grid"></div>
            
            <!-- Hint Button -->
            <button id="hint-btn">💡 Request Hint (-5 Battery)</button>
        </div>
    </div>

    <script src="../game-js/c++.js"></script>


</body>
</html>
